name: Release

on:
  push:
    tags: [ v*.*.* ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  test:
    name: Test
    permissions:
      contents: read
    runs-on: ${{ matrix.job.os }}
    strategy:
      matrix:
        job:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - env:
          TARGET: ${{ matrix.job.target }}
        run: rustup toolchain install 1.56.1 --profile minimal --target "$TARGET" && rustup default 1.56.1
      - name: Install cross
        if: matrix.job.use-cross
        run: cargo install cross
      - name: Test
        shell: bash
        env:
          TARGET: ${{ matrix.job.target }}
          USE_CROSS: ${{ matrix.job.use-cross }}
          FLAGS: ${{ matrix.job.flags }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross test --target "$TARGET" $FLAGS
          else
            cargo test --target "$TARGET" $FLAGS
          fi

  deploy:
    name: Push
    permissions:
      contents: write # needed to upload release assets
    needs: [ test ]
    runs-on: ${{ matrix.job.os }}
    strategy:
      matrix:
        job:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rustflags: -C target-feature=+crt-static
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-cross: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set RUSTFLAGS env variable
        if: matrix.job.rustflags
        shell: bash
        env:
          RUSTFLAGS_VALUE: ${{ matrix.job.rustflags }}
        run: echo "RUSTFLAGS=$RUSTFLAGS_VALUE" >> $GITHUB_ENV

      - env:
          TARGET: ${{ matrix.job.target }}
        run: rustup toolchain install stable --profile minimal --target "$TARGET"

      - name: Install cross
        if: matrix.job.use-cross
        run: cargo install cross

      - name: Build target
        shell: bash
        env:
          TARGET: ${{ matrix.job.target }}
          USE_CROSS: ${{ matrix.job.use-cross }}
          FLAGS: ${{ matrix.job.flags }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --target "$TARGET" $FLAGS
          else
            cargo build --release --target "$TARGET" $FLAGS
          fi

      - name: Strip release binary
        if: matrix.job.os != 'windows-latest'
        env:
          TARGET: ${{ matrix.job.target }}
        run: |
          strip "target/$TARGET/release/furnel"

      - id: get_version
        uses: battila7/get-version-action@d97fbc34ceb64d1f5d95f4dfd6dce33521ccccf5 # v2

      - name: Package
        shell: bash
        env:
          JOB_OS: ${{ matrix.job.os }}
          JOB_TARGET: ${{ matrix.job.target }}
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          if [ "$JOB_OS" = "windows-latest" ]; then
            bin="target/$JOB_TARGET/release/furnel.exe"
          else
            bin="target/$JOB_TARGET/release/furnel"
          fi
          staging="furnel-$VERSION-$JOB_TARGET"

          cp CHANGELOG.md LICENSE.md README.md $bin $staging

          if [ "$JOB_OS" = "windows-latest" ]; then
            7z a "$staging.zip" $staging
          elif [ "$JOB_OS" = "macos-latest" ]; then
            gtar czvf "$staging.tar.gz" $staging
          else
            tar czvf "$staging.tar.gz" $staging
          fi

      - name: Package (debian)
        if: matrix.job.target == 'x86_64-unknown-linux-musl'
        shell: bash
        env:
          JOB_TARGET: ${{ matrix.job.target }}
        run: |
          cargo install cargo-deb
          cargo deb --no-build --target "$JOB_TARGET"
          cp "target/$JOB_TARGET/debian"/*.deb ./

      - name: Publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --draft --generate-notes furnel* || gh release upload "$TAG" furnel* --clobber
